﻿<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta name="google-site-verification" content="VvaBqH5_lcQocPDdMvrdbf2t2FJrE-io7LN0BtmYvvo" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery &#128247;</title>
    <link rel="icon" type="image/png" href="images/yarnball2.png" title="yarn icon" />
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/lightbox.css" />
  </head>
  <body>
    <header>
      <nav id="nav">
        <div class="navdiv">
          <a href="index.html" class="menu">Home</a>
          <a href="about.html" class="menu">About</a>
          <div class="dropdown">
            <span class="menu placeholder">Gallery</span>
            <div class="dropdown-content">
              <a href="crochet.html" class="menu">Crochet</a>
              <a href="sewing.html" class="menu">Sewing</a>
            </div>
          </div>
          <a href="video.html" class="menu">Video</a>
          <a href="contact.html" class="menu">Contact</a>
        </div>
      </nav>
      <div id="mySidenav" class="sidenav" style="background: linear-gradient(315deg, rgb(33, 71, 102) 0%, rgba(38, 80, 115) 20%, rgb(45, 149, 150) 40%, rgb(154, 208, 194) 90%);">
        <a href="index.html" class="menu">Home</a>
        <a href="about.html" class="menu">About</a>
        <span class="menu placeholder" onclick="toggleMobileGallery()" style="cursor: pointer;">Gallery &#9662;</span>
        <div id="mobileGalleryMenu" style="display: none; width: 100%;">
          <a href="crochet.html" class="menu submenu">Crochet</a>
          <a href="sewing.html" class="menu submenu">Sewing</a>
        </div>
        <a href="video.html" class="menu">Video</a>
        <a href="contact.html" class="menu">Contact</a>
      </div>
      <div id="main" style="background: linear-gradient(315deg, rgb(33, 71, 102) 0%, rgba(38, 80, 115) 20%, rgb(45, 149, 150) 40%, rgb(154, 208, 194) 90%);">
        <span style="cursor: pointer; font-family: Playfair Display; color: whitesmoke; font-size: 24px;" onclick="openNav()" class="spanmenu">Menu&#9776;</span>
      </div>
    </header>
    <main>
      <div class="content">
        <h1>Gallery</h1>
        <p class="intro">Gallery is a placeholder page. Please select Crochet or Sewing from the dropdown menu.</p>
      </div>
    </main>

    <script>
      function openNav() {
        var sidenav = document.getElementById("mySidenav");
        if (sidenav.style.maxHeight === "400px") {
          closeNav();
        } else {
          sidenav.style.maxHeight = "400px";
        }
      }

      function closeNav() {
        document.getElementById("mySidenav").style.maxHeight = "0";
        document.getElementById("mobileGalleryMenu").style.display = "none";
      }

      function toggleMobileGallery() {
        var submenu = document.getElementById("mobileGalleryMenu");
        if (submenu.style.display === "block") {
          submenu.style.display = "none";
        } else {
          submenu.style.display = "block";
        }
      }
    </script>
  </body>
</html>
